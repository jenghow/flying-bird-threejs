const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function midiNoteName(n) { return NOTE_NAMES[n % 12] + (Math.floor(n / 12) - 1); }

function parseMidi(buf) {
    const d = new DataView(buf);
    let p = 0;
    const u8 = () => d.getUint8(p++);
    const u16 = () => { const v = d.getUint16(p); p += 2; return v; };
    const u32 = () => { const v = d.getUint32(p); p += 4; return v; };
    const vlq = () => { let v = 0, b; do { b = u8(); v = (v << 7) | (b & 0x7F); } while (b & 0x80); return v; };
    const str = (n) => { let s = ''; for (let i = 0; i < n; i++) s += String.fromCharCode(u8()); return s; };

    if (str(4) !== 'MThd') throw new Error('Not MIDI');
    const hdrLen = u32(); const fmt = u16(); const nTrk = u16(); const div = u16();
    p += hdrLen - 6;

    let tempo = 500000;
    const events = [];

    for (let t = 0; t < nTrk; t++) {
        if (str(4) !== 'MTrk') throw new Error('Bad track');
        const trkLen = u32(); const trkEnd = p + trkLen;
        let run = 0, ticks = 0;
        while (p < trkEnd) {
            ticks += vlq();
            let st = u8();
            if (st === 0xFF) {
                const mt = u8(); const ml = vlq();
                if (mt === 0x51 && ml >= 3) tempo = (u8() << 16) | (u8() << 8) | u8();
                else p += ml;
                run = 0;
            } else if (st === 0xF0 || st === 0xF7) { p += vlq(); run = 0; }
            else {
                if (st & 0x80) { run = st; } else { st = run; p--; }
                const ty = st & 0xF0;
                if (ty === 0x90) { const n = u8(); const v = u8(); if (v > 0) events.push({ t: 'on', tick: ticks, note: n, vel: v / 127, tempo }); }
                else if (ty === 0x80) { const n = u8(); u8(); events.push({ t: 'off', tick: ticks, note: n }); }
                else if (ty === 0xA0 || ty === 0xE0) { p += 2; }
                else if (ty === 0xB0 || ty === 0xC0 || ty === 0xD0) { p++; }
            }
        }
        p = trkEnd;
    }

    events.sort((a, b) => a.tick - b.tick);
    let curTempo = 500000, lastTick = 0, lastTime = 0;
    const notes = [], active = {};
    for (const ev of events) {
        if (ev.tempo) curTempo = ev.tempo;
        lastTime += ((ev.tick - lastTick) * curTempo) / (div * 1e6);
        lastTick = ev.tick;
        if (ev.t === 'on') active[ev.note] = { time: lastTime, vel: ev.vel };
        else if (active[ev.note]) {
            notes.push({ time: active[ev.note].time, duration: Math.max(lastTime - active[ev.note].time, 0.05), note: ev.note, vel: active[ev.note].vel });
            delete active[ev.note];
        }
    }
    return { notes, duration: lastTime, bpm: 60e6 / curTempo };
}

let audioReady = false;
let audioSynth = null;
let audioPart = null;

async function initAudio() {
    if (audioReady) return;
    try {
        await Tone.start();
        const raw = atob(MIDI_B64);
        const ab = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) ab[i] = raw.charCodeAt(i);
        const { notes, duration, bpm } = parseMidi(ab.buffer);

        audioSynth = new Tone.PolySynth(Tone.Synth, {
            maxPolyphony: 24,
            voice: Tone.Synth,
            options: { oscillator: { type: 'triangle' }, envelope: { attack: 0.02, decay: 0.3, sustain: 0.4, release: 1.2 } }
        }).toDestination();
        audioSynth.volume.value = -14;

        const evts = notes.map(n => [n.time, { name: midiNoteName(n.note), duration: n.duration, vel: n.vel }]);
        audioPart = new Tone.Part((time, note) => {
            audioSynth.triggerAttackRelease(note.name, note.duration, time, note.vel);
        }, evts);
        audioPart.start(0);

        Tone.Transport.bpm.value = bpm;
        Tone.Transport.loop = true;
        Tone.Transport.loopStart = 0;
        Tone.Transport.loopEnd = duration;
        Tone.Transport.start();
        audioReady = true;
    } catch (e) { console.warn('MIDI init failed:', e); }
}

function setAudioPause(p) {
    if (!audioReady) return;
    if (p) Tone.Transport.pause();
    else Tone.Transport.start();
}

function getTerrainHeight(x, z) {
    const s = params.noiseScale;
    const e = params.elevation;
    return noise2D(x * s, z * s) * e
         + noise2D(x * s * 2.13, z * s * 2.13) * e * 0.45
         + noise2D(x * s * 4.27, z * s * 4.27) * e * 0.2
         + noise2D(x * s * 8.1, z * s * 8.1) * e * 0.08;
}

const _bc = new THREE.Color();
function getBiomeColor(height, x, z) {
    const dx = getTerrainHeight(x + 2, z) - getTerrainHeight(x - 2, z);
    const dz = getTerrainHeight(x, z + 2) - getTerrainHeight(x, z - 2);
    const slope = Math.abs(dx) + Math.abs(dz);
    const v = noise2D(x * 0.025, z * 0.025) * 0.04;
    const wl = params.waterLevel;
    const sl = params.snowLine;

    if (height < wl - 3) return _bc.setRGB(0.06 + v, 0.18 + v, 0.38 + v);
    if (height < wl + 0.5) return _bc.setRGB(0.12 + v, 0.35 + v, 0.58 + v);
    if (height < wl + 4 && slope < 1.5) return _bc.setRGB(0.72 + v, 0.62 + v, 0.4 + v);
    if (slope > 4) return _bc.setRGB(0.42 + v, 0.4 + v, 0.37 + v);
    if (height > sl) return _bc.setRGB(0.9 + v, 0.91 + v, 0.94 + v);
    if (height > sl * 0.72) return _bc.setRGB(0.48 + v, 0.46 + v, 0.42 + v);
    if (height > sl * 0.4) return _bc.setRGB(0.13 + v, 0.37 + v, 0.14 + v);
    return _bc.setRGB(0.28 + v, 0.58 + v, 0.22 + v);
}

const terrainMat = new THREE.MeshStandardMaterial({
    vertexColors: true,
    flatShading: true,
    roughness: 0.88,

const birdGroup = new THREE.Group();
const birdParts = {};
(function buildBird() {
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4a5568, roughness: 0.7 });
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x2d3748, roughness: 0.6 });
    const wingMat = new THREE.MeshStandardMaterial({ color: 0x374151, side: THREE.DoubleSide, roughness: 0.65 });
    const wingUnder = new THREE.MeshStandardMaterial({ color: 0x9ca3af, side: THREE.DoubleSide, roughness: 0.7 });
    const beakMat = new THREE.MeshStandardMaterial({ color: 0xed8936, roughness: 0.4 });
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });

    const bodyG = new THREE.CapsuleGeometry(0.55, 2.2, 10, 14);
    const body = new THREE.Mesh(bodyG, bodyMat);
    body.rotation.x = Math.PI / 2;
    birdGroup.add(body);

    const headG = new THREE.SphereGeometry(0.38, 14, 10);
    const head = new THREE.Mesh(headG, darkMat);
    head.position.set(0, 0.18, 1.45);
    birdGroup.add(head);

    const beakG = new THREE.ConeGeometry(0.1, 0.55, 8);
    const beak = new THREE.Mesh(beakG, beakMat);
    beak.rotation.x = -Math.PI / 2;
    beak.position.set(0, 0.08, 1.85);
    birdGroup.add(beak);

    const eyeG = new THREE.SphereGeometry(0.055, 8, 6);
    [-1, 1].forEach(side => {
        const eye = new THREE.Mesh(eyeG, eyeMat);
        eye.position.set(side * 0.24, 0.3, 1.35);
        birdGroup.add(eye);
    });

    function makeWing(len, rootW, tipW, mat) {
        const sh = new THREE.Shape();
        sh.moveTo(0, -rootW / 2);
        sh.lineTo(0, rootW / 2);
        sh.quadraticCurveTo(-len * 0.55, tipW * 0.65, -len, tipW / 2);
        sh.lineTo(-len, -tipW / 2);
        sh.quadraticCurveTo(-len * 0.55, -tipW * 0.65, 0, -rootW / 2);
        const g = new THREE.ShapeGeometry(sh);
        g.rotateX(-Math.PI / 2);
        return new THREE.Mesh(g, mat);
    }

    birdParts.leftWingPivot = new THREE.Group();
    birdParts.leftWingPivot.position.set(-0.55, 0.12, -0.1);
    birdGroup.add(birdParts.leftWingPivot);
    birdParts.leftWingPivot.add(makeWing(1.6, 0.5, 0.75, wingMat));
    const luP = new THREE.Group();
    luP.position.set(-1.6, 0, 0.05);
    birdParts.leftWingPivot.add(luP);
    luP.add(makeWing(1.4, 0.75, 0.25, wingMat));
    birdParts.leftOuterPivot = luP;

    const lUnder = makeWing(1.6, 0.48, 0.7, wingUnder);
    lUnder.position.y = -0.02;
    birdParts.leftWingPivot.add(lUnder);

    birdParts.rightWingPivot = new THREE.Group();
    birdParts.rightWingPivot.position.set(0.55, 0.12, -0.1);
    birdGroup.add(birdParts.rightWingPivot);
    const rw = makeWing(1.6, 0.5, 0.75, wingMat);
    rw.scale.x = -1;
    birdParts.rightWingPivot.add(rw);
    const ruP = new THREE.Group();
    ruP.position.set(1.6, 0, 0.05);
    birdParts.rightWingPivot.add(ruP);
    const rou = makeWing(1.4, 0.75, 0.25, wingMat);
    rou.scale.x = -1;
    ruP.add(rou);
    birdParts.rightOuterPivot = ruP;

    const rUnder = makeWing(1.6, 0.48, 0.7, wingUnder);
    rUnder.scale.x = -1;
    rUnder.position.y = -0.02;
    birdParts.rightWingPivot.add(rUnder);

    const tailSh = new THREE.Shape();
    tailSh.moveTo(-0.35, 0);
    tailSh.lineTo(0.35, 0);
    tailSh.lineTo(0.5, -1.1);
    tailSh.lineTo(-0.5, -1.1);
    tailSh.closePath();
    const tailG = new THREE.ShapeGeometry(tailSh);
    tailG.rotateX(-Math.PI / 2);
    birdParts.tail = new THREE.Mesh(tailG, wingMat);
    birdParts.tail.position.set(0, 0.06, -1.5);
    birdGroup.add(birdParts.tail);

    scene.add(birdGroup);
})();

const keys = {};
let paused = true;
let started = false;
const pausedEl = document.getElementById('paused');
const startModal = document.getElementById('startModal');
window.addEventListener('keydown', e => {
    if (!started) { started = true; startModal.style.display = 'none'; paused = false; pausedEl.style.display = 'none'; initAudio(); e.preventDefault(); return; }
    if (!audioReady) initAudio();
    if (e.code === 'Space') { paused = !paused; pausedEl.style.display = paused ? 'block' : 'none'; setAudioPause(paused); e.preventDefault(); return; }
    keys[e.code] = true; e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function updatePhysics(dt) {
    let accel = 0, pitchTgt = 0, yawR = 0, rollTgt = 0;

    if (keys['KeyW']) { accel = 40; pitchTgt = -0.12; }
    if (keys['KeyS']) { accel = -30; pitchTgt = 0.18; }
    if (keys['KeyA']) { yawR = 1.4; rollTgt = -0.55; }
    if (keys['KeyD']) { yawR = -1.4; rollTgt = 0.55; }
    if (keys['KeyE'] && phys.flapCD <= 0) {
        phys.vY = 28;
        phys.flapCD = 0.45;
        wingAnim.phase = phys.flapPhase;
    }
    if (keys['KeyQ']) { pitchTgt = -0.45; phys.vY -= 60 * dt; }

    phys.vY -= params.gravity * dt;
    phys.vY = THREE.MathUtils.clamp(phys.vY, -55, 40);

    phys.speed += accel * dt;
    phys.speed = THREE.MathUtils.clamp(phys.speed, 5, 85);
    phys.speed *= Math.pow(0.975, dt * 60);

    phys.yaw += yawR * dt * Math.min(phys.speed / 30, 1.5);
    phys.pitch = THREE.MathUtils.lerp(phys.pitch, pitchTgt, 2.8 * dt);
    phys.roll = THREE.MathUtils.lerp(phys.roll, rollTgt, 3.5 * dt);

    const fwd = new THREE.Vector3(
        Math.sin(phys.yaw) * Math.cos(phys.pitch),
        Math.sin(phys.pitch),
        Math.cos(phys.yaw) * Math.cos(phys.pitch)
    );

    phys.vel.copy(fwd).multiplyScalar(phys.speed);
    phys.vel.y += phys.vY;
    phys.pos.addScaledVector(phys.vel, dt);

    const gH = getTerrainHeight(phys.pos.x, phys.pos.z);
    const minY = Math.max(gH + 2.5, params.waterLevel + 1.5);
    if (phys.pos.y < minY) {
        phys.pos.y = minY;
        phys.vY = Math.abs(phys.vY) * 0.2;
        phys.speed = Math.max(phys.speed, 18);
    }

    phys.flapCD -= dt;
}

function updateBirdModel(dt) {
    birdGroup.position.copy(phys.pos);
    const euler = new THREE.Euler(phys.pitch, phys.yaw, phys.roll, 'YXZ');
    const tgtQ = new THREE.Quaternion().setFromEuler(euler);
    birdGroup.quaternion.slerp(tgtQ, 6 * dt);

    const flapping = (keys['KeyE'] && phys.flapCD > -0.1 && phys.flapCD < 0.35);
    if (flapping) {
        phys.flapPhase += 14 * dt;
        wingAnim.amplitude = THREE.MathUtils.lerp(wingAnim.amplitude, 0.65, 10 * dt);
    } else {
        wingAnim.amplitude = THREE.MathUtils.lerp(wingAnim.amplitude, 0.06, 2.5 * dt);
    }

    const fa = Math.sin(phys.flapPhase) * wingAnim.amplitude;
    birdParts.leftWingPivot.rotation.z = -fa - 0.07;
    birdParts.leftOuterPivot.rotation.z = -fa * 0.45;
    birdParts.rightWingPivot.rotation.z = fa + 0.07;
    birdParts.rightOuterPivot.rotation.z = fa * 0.45;

    const pitchKick = phys.pitch * 0.3;
    birdParts.tail.rotation.x = THREE.MathUtils.lerp(birdParts.tail.rotation.x, -pitchKick - fa * 0.2, 5 * dt);
}

function updateCamera(dt) {
    const fwd = new THREE.Vector3(
        Math.sin(phys.yaw) * Math.cos(phys.pitch),
        Math.sin(phys.pitch),
        Math.cos(phys.yaw) * Math.cos(phys.pitch)
    );

    const behind = fwd.clone().multiplyScalar(-1);
    const dist = 20;
    const height = 9;
    const tgtPos = phys.pos.clone()
        .addScaledVector(behind, dist)
        .add(new THREE.Vector3(0, height, 0));

    const lookPt = phys.pos.clone().addScaledVector(fwd, camState.lookAhead);

    const lerpF = 3.5 * dt;
    camState.currentPos.lerp(tgtPos, lerpF);
    camState.currentLook.lerp(lookPt, lerpF);

    camera.position.copy(camState.currentPos);
    camera.lookAt(camState.currentLook);

    const speedRatio = phys.speed / 85;
    camera.fov = THREE.MathUtils.lerp(camState.baseFOV, camState.maxFOV, speedRatio);
    camera.updateProjectionMatrix();
}

const chunks = new Map();
let chunkQueue = [];

function genChunkKey(cx, cz) { return `${cx},${cz}`; }

function createChunkMesh(cx, cz, segs) {
    const geo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE, segs, segs);
    geo.rotateX(-Math.PI / 2);
    const pos = geo.attributes.position;
    const cols = new Float32Array(pos.count * 3);
    const hArr = new Float32Array(pos.count);

    for (let i = 0; i < pos.count; i++) {
        const wx = pos.getX(i) + cx * CHUNK_SIZE;
        const wz = pos.getZ(i) + cz * CHUNK_SIZE;
        const h = getTerrainHeight(wx, wz);
        pos.setY(i, h);
        hArr[i] = h;
        const c = getBiomeColor(h, wx, wz);
        cols[i * 3] = c.r;
        cols[i * 3 + 1] = c.g;
        cols[i * 3 + 2] = c.b;
    }

    geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
    geo.computeVertexNormals();
    const mesh = new THREE.Mesh(geo, terrainMat);
    mesh.position.set(cx * CHUNK_SIZE, 0, cz * CHUNK_SIZE);
    mesh.frustumCulled = true;
    scene.add(mesh);
    return { mesh, hArr, segs, cx, cz };
}

function createChunkTrees(cx, cz, segs) {
    const positions = [];
    const step = CHUNK_SIZE / 18;
    const half = CHUNK_SIZE / 2;

    for (let lx = -half + step; lx < half; lx += step) {
        for (let lz = -half + step; lz < half; lz += step) {
            const wx = lx + cx * CHUNK_SIZE;
            const wz = lz + cz * CHUNK_SIZE;
            const h = getTerrainHeight(wx, wz);
            if (h < params.waterLevel + 5 || h > params.snowLine * 0.65) continue;

            const dx = getTerrainHeight(wx + 1.5, wz) - getTerrainHeight(wx - 1.5, wz);
            const dz = getTerrainHeight(wx, wz + 1.5) - getTerrainHeight(wx, wz - 1.5);
            if (Math.abs(dx) + Math.abs(dz) > 3) continue;

            const tn = treeNoise2D(wx * 0.08, wz * 0.08);
            if (tn > 0.2 && positions.length < MAX_TREES_PER_CHUNK) {
                positions.push({ x: wx, y: h, z: wz, s: 0.7 + (tn - 0.2) * 1.5 });
            }
        }
    }

    if (positions.length === 0) return null;

    const group = new THREE.Group();
    const count = positions.length;

    const trunkG = new THREE.CylinderGeometry(0.15, 0.25, 2.2, 5);
    const trunkM = new THREE.MeshStandardMaterial({ color: 0x5D4037, roughness: 0.9 });
    const trunks = new THREE.InstancedMesh(trunkG, trunkM, count);

    const canopyG = new THREE.ConeGeometry(1.6, 3.5, 6);
    const canopyM = new THREE.MeshStandardMaterial({ color: 0x2E7D32, roughness: 0.85 });
    const canopies = new THREE.InstancedMesh(canopyG, canopyM, count);

    const dummy = new THREE.Object3D();
    for (let i = 0; i < count; i++) {
        const p = positions[i];
        dummy.position.set(p.x, p.y + 1.1 * p.s, p.z);
        dummy.scale.setScalar(p.s);
        dummy.rotation.y = (p.x * 3.7 + p.z * 7.1) % (Math.PI * 2);
        dummy.updateMatrix();
        trunks.setMatrixAt(i, dummy.matrix);

        dummy.position.y = p.y + 2.8 * p.s;
        dummy.updateMatrix();
        canopies.setMatrixAt(i, dummy.matrix);
    }
    trunks.instanceMatrix.needsUpdate = true;
    canopies.instanceMatrix.needsUpdate = true;
    trunks.frustumCulled = true;
    canopies.frustumCulled = true;

    group.add(trunks, canopies);
    scene.add(group);
    return group;
}

function disposeChunk(chunk) {
    if (chunk.mesh) {
        chunk.mesh.geometry.dispose();
        scene.remove(chunk.mesh);
    }
    if (chunk.treeGroup) {
        chunk.treeGroup.traverse(c => {
            if (c.geometry) c.geometry.dispose();
            if (c.material) c.material.dispose();
        });
        scene.remove(chunk.treeGroup);
    }
    if (chunk.waterMesh) {
        chunk.waterMesh.geometry.dispose();
        chunk.waterMesh.material.dispose();
        scene.remove(chunk.waterMesh);
    }
}

function getLOD(cx, cz, bcx, bcz) {
    const dx = cx - bcx, dz = cz - bcz;
    return Math.sqrt(dx * dx + dz * dz) < LOD_INNER ? CHUNK_SEG_NEAR : CHUNK_SEG_FAR;
}

function scheduleChunk(cx, cz) {
    const k = genChunkKey(cx, cz);
    if (chunks.has(k) || chunkQueue.some(q => q.k === k)) return;
    chunkQueue.push({ cx, cz, k });
}

function processQueue() {
    let done = 0;
    while (chunkQueue.length > 0 && done < MAX_CHUNK_OPS) {
        const { cx, cz, k } = chunkQueue.shift();
        if (chunks.has(k)) continue;
        const bcx = Math.round(phys.pos.x / CHUNK_SIZE);
        const bcz = Math.round(phys.pos.z / CHUNK_SIZE);
        const segs = getLOD(cx, cz, bcx, bcz);
        const chunk = createChunkMesh(cx, cz, segs);
        chunk.treeGroup = createChunkTrees(cx, cz, segs);

        const half = CHUNK_SIZE / 2;
        let hasWater = false;
        for (let lx = -half; lx <= half; lx += CHUNK_SIZE / 4) {
            for (let lz = -half; lz <= half; lz += CHUNK_SIZE / 4) {
                if (getTerrainHeight(lx + cx * CHUNK_SIZE, lz + cz * CHUNK_SIZE) < params.waterLevel) {
                    hasWater = true;
                    break;
                }
            }
            if (hasWater) break;
        }
        if (hasWater) {
            const wGeo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE);
            wGeo.rotateX(-Math.PI / 2);
            const wMat = new THREE.MeshStandardMaterial({
                color: 0x2196F3, transparent: true, opacity: 0.65,
                roughness: 0.1, metalness: 0.35, side: THREE.DoubleSide,
            });
            const wMesh = new THREE.Mesh(wGeo, wMat);
            wMesh.position.set(cx * CHUNK_SIZE, params.waterLevel + 0.3, cz * CHUNK_SIZE);
            wMesh.frustumCulled = true;
            scene.add(wMesh);
            chunk.waterMesh = wMesh;
        }

        chunks.set(k, chunk);
        done++;
    }
}

function updateChunks() {
    const bcx = Math.round(phys.pos.x / CHUNK_SIZE);
    const bcz = Math.round(phys.pos.z / CHUNK_SIZE);
    const rd = params.renderDist;

    for (let dx = -rd; dx <= rd; dx++) {
        for (let dz = -rd; dz <= rd; dz++) {
            if (dx * dx + dz * dz <= (rd + 0.5) * (rd + 0.5)) {
                scheduleChunk(bcx + dx, bcz + dz);
            }
        }
    }

    for (const [k, chunk] of chunks) {
        const [cx, cz] = k.split(',').map(Number);
        const dx = cx - bcx, dz = cz - bcz;
        if (dx * dx + dz * dz > (rd + 2) * (rd + 2)) {
            disposeChunk(chunk);
            chunks.delete(k);
        }
    }

    for (const [k, chunk] of chunks) {
        const [cx, cz] = k.split(',').map(Number);
        const desired = getLOD(cx, cz, bcx, bcz);
        if (chunk.segs !== desired && chunkQueue.length < 10) {
            disposeChunk(chunk);
            chunks.delete(k);
            scheduleChunk(cx, cz);
        }
    }

    processQueue();
}

const waterPlaneGeo = new THREE.PlaneGeometry(3000, 3000, 64, 64);
waterPlaneGeo.rotateX(-Math.PI / 2);
const waterPlaneMat = new THREE.MeshStandardMaterial({
    color: 0x1976D2, transparent: true, opacity: 0.72,
    roughness: 0.05, metalness: 0.4, side: THREE.DoubleSide,
});
const waterPlane = new THREE.Mesh(waterPlaneGeo, waterPlaneMat);
waterPlane.position.y = params.waterLevel;
waterPlane.frustumCulled = false;
scene.add(waterPlane);

const cloudGeo = new THREE.SphereGeometry(1, 8, 6);
const cloudMat = new THREE.MeshStandardMaterial({
    color: 0xffffff, transparent: true, opacity: 0.7,
    roughness: 1.0, metalness: 0.0, depthWrite: false,
});
const cloudMesh = new THREE.InstancedMesh(cloudGeo, cloudMat, MAX_CLOUDS);
cloudMesh.frustumCulled = false;
scene.add(cloudMesh);
const CLOUD_SHAPES = [
    { sx: 8, sy: 2, sz: 6 },
    { sx: 3, sy: 1, sz: 2.5 },
    { sx: 10, sy: 0.5, sz: 4 },
    { sx: 5, sy: 3, sz: 5 },
    { sx: 2, sy: 0.4, sz: 1.5 },
    { sx: 6, sy: 1.5, sz: 4 },
    { sx: 9, sy: 2.5, sz: 7 },
    { sx: 4, sy: 0.3, sz: 3 },
    { sx: 12, sy: 2, sz: 8 },
    { sx: 2.5, sy: 0.8, sz: 2 },
];
const cloudPositions = [];
for (let i = 0; i < MAX_CLOUDS; i++) {
    const shape = CLOUD_SHAPES[Math.floor(Math.random() * CLOUD_SHAPES.length)];
    const vary = () => 0.8 + Math.random() * 0.4;
    cloudPositions.push({
        angle: Math.random() * Math.PI * 2,
        radius: 180 + Math.random() * 350,
        y: 140 + Math.random() * 60,
        speed: 0.02 + Math.random() * 0.04,
        scaleX: shape.sx * vary(),
        scaleY: shape.sy * vary(),
        scaleZ: shape.sz * vary(),
    });
}

function updateClouds() {
    const dummy = new THREE.Object3D();
    const activeCount = Math.min(MAX_CLOUDS, params.cloudCount);
    cloudMesh.count = activeCount;

    for (let i = 0; i < activeCount; i++) {
        const cp = cloudPositions[i];
        cp.angle += cp.speed * 0.01;
        const wx = phys.pos.x + Math.cos(cp.angle) * cp.radius;
        const wz = phys.pos.z + Math.sin(cp.angle) * cp.radius;

        dummy.position.set(wx, cp.y, wz);
        dummy.scale.set(cp.scaleX, cp.scaleY, cp.scaleZ);
        dummy.updateMatrix();
        cloudMesh.setMatrixAt(i, dummy.matrix);
    }
    cloudMesh.instanceMatrix.needsUpdate = true;
}

function updateAtmosphere() {
    const t = params.timeOfDay;
    const sunAngle = ((t - 5) / 14) * Math.PI;
    const sunH = Math.sin(sunAngle);
    const sunVisible = Math.max(0, sunH);

    sunLight.position.set(
        Math.cos(sunAngle) * 300,
        Math.max(sunH * 300, 10),
        120
    );
    sunLight.intensity = sunVisible * 1.6;

    const warmth = Math.max(0, 1 - Math.abs(t - 12) / 5);
    sunLight.color.setHSL(0.08 + warmth * 0.015, 0.85, 0.55 + sunVisible * 0.3);

    ambientLight.intensity = 0.12 + sunVisible * 0.35;

    const skyH = 0.55;
    const skyS = 0.45 + sunVisible * 0.25;
    const skyL = 0.08 + sunVisible * 0.52;
    const skyColor = new THREE.Color().setHSL(skyH, skyS, skyL);

    scene.background.copy(skyColor);
    scene.fog.color.copy(skyColor);
    scene.fog.density = params.fogDensity;

    waterPlaneMat.color.setHSL(0.57, 0.6, 0.15 + sunVisible * 0.25);
    waterPlaneMat.opacity = 0.55 + sunVisible * 0.2;
}

const gui = new GUI({ width: 280 });
gui.domElement.style.position = 'fixed';
gui.domElement.style.left = '10px';
gui.domElement.style.top = '10px';
gui.domElement.style.maxHeight = 'calc(100vh - 20px)';
gui.domElement.style.overflowY = 'auto';

const fTerrain = gui.addFolder('Terrain');
fTerrain.add(params, 'noiseScale', 0.002, 0.025).name('Noise Scale');
fTerrain.add(params, 'elevation', 20, 200).name('Elevation');
fTerrain.add(params, 'waterLevel', -20, 40).name('Water Level');
fTerrain.add(params, 'snowLine', 30, 150).name('Snow Line');

const fEnv = gui.addFolder('Environment');
fEnv.add(params, 'fogDensity', 0.0005, 0.02).name('Fog Density');
fEnv.addColor(params, 'fogColor').name('Fog Color');
fEnv.add(params, 'cloudCount', 10, MAX_CLOUDS).step(1).name('Cloud Count');
fEnv.add(params, 'timeOfDay', 0, 24).step(0.1).name('Time of Day');
fEnv.add(params, 'gravity', 2, 40).step(0.5).name('Gravity');

const fPerf = gui.addFolder('Performance');
fPerf.add(params, 'renderDist', 2, 10).step(1).name('Render Dist');

const worldActions = { regenerate() {
    for (const [, c] of chunks) disposeChunk(c);
    chunks.clear();
    chunkQueue = [];
    noise2D = createNoise2D();
    treeNoise2D = createNoise2D();

    const newGH = getTerrainHeight(phys.pos.x, phys.pos.z);
    phys.pos.y = Math.max(newGH + 40, params.waterLevel + 40);
    phys.vY = 0;
    phys.speed = 30;
    phys.pitch = 0;
    phys.roll = 0;

    camState.currentPos.copy(phys.pos).add(new THREE.Vector3(0, 9, -20));
    camState.currentLook.copy(phys.pos).add(new THREE.Vector3(0, 0, 12));

    const bcx = Math.round(phys.pos.x / CHUNK_SIZE);
    const bcz = Math.round(phys.pos.z / CHUNK_SIZE);
    const rd = params.renderDist;
    for (let dx = -rd; dx <= rd; dx++) {
        for (let dz = -rd; dz <= rd; dz++) {
            if (dx * dx + dz * dz <= (rd + 0.5) * (rd + 0.5)) {
                scheduleChunk(bcx + dx, bcz + dz);
            }
        }
    }
    processQueue();
    processQueue();
}};
gui.add(worldActions, 'regenerate').name('Regenerate World');

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

const fpsEl = document.getElementById('fps');
const statsEl = document.getElementById('stats');
let frameCount = 0, lastFpsTime = performance.now();

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    if (!paused) {
        updatePhysics(dt);
        updateBirdModel(dt);
        updateCamera(dt);
    }
    updateChunks();
    updateClouds();
    updateAtmosphere();

    waterPlane.position.x = phys.pos.x;
    waterPlane.position.z = phys.pos.z;
    waterPlane.position.y = params.waterLevel;

    const waveT = clock.elapsedTime;
    const waveVerts = waterPlaneGeo.attributes.position;
    for (let i = 0; i < waveVerts.count; i++) {
        const x = waveVerts.getX(i) + phys.pos.x;
        const z = waveVerts.getZ(i) + phys.pos.z;
        const wave = Math.sin(x * 0.03 + waveT * 1.5) * 0.8
                   + Math.sin(z * 0.025 + waveT * 1.2) * 0.6
                   + Math.sin((x + z) * 0.02 + waveT * 0.8) * 0.4;
        waveVerts.setY(i, wave);
    }
    waveVerts.needsUpdate = true;

    renderer.render(scene, camera);

    frameCount++;
    const now = performance.now();
    if (now - lastFpsTime > 500) {
        const fps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
        fpsEl.textContent = fps + ' FPS | Chunks: ' + chunks.size;
        statsEl.textContent = `Speed: ${Math.round(phys.speed)} | Alt: ${Math.round(phys.pos.y)} | Heading: ${Math.round(THREE.MathUtils.radToDeg(phys.yaw) % 360)}°`;
        frameCount = 0;
        lastFpsTime = now;
    }
}

function init() {
    const startY = Math.max(getTerrainHeight(0, 0) + 35, params.waterLevel + 35);
    phys.pos.set(0, startY, 0);
    phys.speed = 30;

    camState.currentPos.set(0, startY + 9, -20);
    camState.currentLook.set(0, startY, 12);

    for (let dx = -params.renderDist; dx <= params.renderDist; dx++) {
        for (let dz = -params.renderDist; dz <= params.renderDist; dz++) {
            if (dx * dx + dz * dz <= (params.renderDist + 0.5) * (params.renderDist + 0.5)) {
                scheduleChunk(dx, dz);
            }
        }
    }

    updateClouds();
    animate();
}

init();
    </script>
